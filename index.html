<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lottery Calc" />
<title>Investment Income Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; }
  @media print {
    body, html { background: #fff !important; color: #000 !important; }
    .no-print { display: none !important; }
    .print-root { background: #fff !important; color: #111 !important; padding: 0 !important; font-size: 11px !important; }
    .print-root * { color: #111 !important; border-color: #ccc !important; }
    .print-root .summary-box { border: 2px solid #111 !important; background: #f5f5f5 !important; }
    .print-root .summary-box * { color: #111 !important; }
    .print-root .highlight-row { font-weight: 700 !important; }
    .print-root .section-header { color: #333 !important; border-bottom: 1px solid #999; padding-bottom: 2px; }
    .print-root .disclaimer { color: #666 !important; font-size: 9px !important; }
    .print-root table { width: 100% !important; }
    .print-root td, .print-root th { font-size: 10px !important; padding: 2px 8px 2px 0 !important; }
    .print-params-block { display: block !important; }
    @page { margin: 0.5in; size: letter; }
  }
  .print-params-block { display: none; }
</style>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

const DEFAULT_ALLOCS = [
  { label: "S&P 500 (VOO/SPY/IVV)", shortLabel: "S&P 500", pct: 50, yield: 0.013, type: "qualified", grows: true },
  { label: "Dividend ETF (SCHD)", shortLabel: "SCHD", pct: 15, yield: 0.035, type: "qualified", grows: false },
  { label: "REITs (VNQ/SCHH)", shortLabel: "REITs", pct: 8, yield: 0.042, type: "reit", grows: false },
  { label: "Municipal Bonds (AR)", shortLabel: "Munis", pct: 7, yield: 0.030, type: "muni", grows: false },
  { label: "T-Bills", shortLabel: "T-Bills", pct: 10, yield: 0.0425, type: "tbill", grows: false },
  { label: "Individual Stocks", shortLabel: "Stocks", pct: 5, yield: 0.02, type: "qualified", grows: true },
  { label: "Cash Sweep / Money Market", shortLabel: "Sweep", pct: 5, yield: 0.04, type: "sweep", grows: false },
];

const DEFAULTS = {
  cashRatio: 0.50, fedWithholding: 0.24, fedTopRate: 0.37, niit: 0.038,
  qualDivRate: 0.20, arStateRate: 0.037,
  reitFedRate: 0.296,
  milestones: [1, 5, 10, 15, 20, 30, 40, 50],
};

const AMI_2026 = 47000;
const AMI_GROWTH = 0.026;

const fmt = (n) => {
  if (Math.abs(n) >= 1e9) return "$" + (n / 1e9).toFixed(2) + "B";
  if (Math.abs(n) >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
  return n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
};
const fmtFull = (n) => n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
const pct = (n) => (n * 100).toFixed(1) + "%";

function SectionHeader({ children }) {
  return (<div className="section-header" style={{ fontSize: "12px", fontWeight: 600, color: "#666", marginTop: 28, marginBottom: 8, letterSpacing: "0.04em" }}>{children}</div>);
}

function Table({ headers, rows, highlight = [] }) {
  const cellStyle = (ci, ri) => ({
    padding: "4px 12px 4px 0", whiteSpace: "nowrap",
    color: highlight.includes(ri) ? "#8bc34a" : "#ccc",
    fontWeight: highlight.includes(ri) ? 600 : 400,
    borderBottom: rows[ri]?.[0] === "" ? "none" : "1px solid #1a1a1a", fontSize: "13px",
  });
  return (
    <div style={{ overflowX: "auto", marginBottom: 8 }}>
      <table style={{ borderCollapse: "collapse", width: "100%" }}>
        {headers && (<thead><tr>{headers.map((h, i) => (<th key={i} style={{ padding: "4px 12px 4px 0", textAlign: "left", fontSize: "11px", color: "#555", fontWeight: 500, borderBottom: "1px solid #333" }}>{h}</th>))}</tr></thead>)}
        <tbody>{rows.map((row, ri) => (<tr key={ri} className={highlight.includes(ri) ? "highlight-row" : ""}>{row.map((cell, ci) => (<td key={ci} style={cellStyle(ci, ri)}>{cell}</td>))}</tr>))}</tbody>
      </table>
    </div>
  );
}

function App() {
  const [mode, setMode] = useState("lottery");
  const [jackpotInput, setJackpotInput] = useState("296000000");
  const [cashInput, setCashInput] = useState("");
  const [useCustomCash, setUseCustomCash] = useState(false);
  const [lumpSumInput, setLumpSumInput] = useState("");
  const [withdrawalInput, setWithdrawalInput] = useState("0");
  const [setAsideInput, setSetAsideInput] = useState("0");
  const [allocs, setAllocs] = useState(DEFAULT_ALLOCS.map(a => a.pct));
  const [yields, setYields] = useState(DEFAULT_ALLOCS.map(a => (a.yield * 100).toFixed(2)));
  const [growthRateInput, setGrowthRateInput] = useState("7");
  const [showSatellites, setShowSatellites] = useState(false);
  const [satCount, setSatCount] = useState("3");
  const [satFunding, setSatFunding] = useState("3500000");
  const [satTriggerYear, setSatTriggerYear] = useState("15");
  const [satGrowthRate, setSatGrowthRate] = useState("7");
  const [satAmiMultiplier, setSatAmiMultiplier] = useState("5");

  const totalAlloc = allocs.reduce((s, v) => s + v, 0);
  const handleSlider = useCallback((i, v) => { setAllocs(p => { const u = [...p]; u[i] = v; return u; }); }, []);
  const resetAllocs = useCallback(() => { setAllocs(DEFAULT_ALLOCS.map(a => a.pct)); setYields(DEFAULT_ALLOCS.map(a => (a.yield * 100).toFixed(2))); }, []);
  const growthRate = (parseFloat(growthRateInput) || 7) / 100;

  const calc = useMemo(() => {
    const isLottery = mode === "lottery";
    const allocations = DEFAULT_ALLOCS.map((a, i) => ({ ...a, pct: allocs[i] / 100, yield: (parseFloat(yields[i]) || 0) / 100 }));
    let jackpot = 0, cash = 0, cashRatioActual = 0, ratioFlag = false;
    let fedWithholding = 0, fedActual = 0, fedOwedAtFiling = 0, arTax = 0, totalTax = 0, net = 0;
    if (isLottery) {
      jackpot = parseFloat(jackpotInput) || 0;
      const defaultCash = jackpot * DEFAULTS.cashRatio;
      cash = useCustomCash && cashInput ? parseFloat(cashInput) : defaultCash;
      cashRatioActual = jackpot > 0 ? cash / jackpot : 0;
      ratioFlag = cashRatioActual < 0.42 || cashRatioActual > 0.62;
      fedWithholding = cash * DEFAULTS.fedWithholding;
      fedActual = cash * DEFAULTS.fedTopRate;
      fedOwedAtFiling = fedActual - fedWithholding;
      arTax = cash * DEFAULTS.arStateRate;
      totalTax = fedActual + arTax;
      net = cash - totalTax;
    } else { net = parseFloat(lumpSumInput) || 0; }
    const setAside = parseFloat(setAsideInput) || 0;
    const investable = Math.max(net - setAside, 0);
    const buckets = allocations.map((a) => {
      const invested = investable * a.pct;
      const grossIncome = invested * a.yield;
      let fedTax, stateTax, afterTax;
      if (a.type === "qualified") {
        const rate = DEFAULTS.qualDivRate + DEFAULTS.niit;
        fedTax = grossIncome * rate;
        stateTax = grossIncome * DEFAULTS.arStateRate;
        afterTax = grossIncome - fedTax - stateTax;
      } else if (a.type === "reit") {
        fedTax = grossIncome * DEFAULTS.reitFedRate;
        stateTax = grossIncome * DEFAULTS.arStateRate;
        afterTax = grossIncome - fedTax - stateTax;
      } else if (a.type === "muni") {
        fedTax = 0;
        stateTax = 0;
        afterTax = grossIncome;
      } else if (a.type === "tbill") {
        fedTax = grossIncome * DEFAULTS.fedTopRate;
        stateTax = 0;
        afterTax = grossIncome - fedTax;
      } else {
        fedTax = grossIncome * DEFAULTS.fedTopRate;
        stateTax = grossIncome * DEFAULTS.arStateRate;
        afterTax = grossIncome - fedTax - stateTax;
      }
      return { ...a, invested, grossIncome, fedTax, stateTax, afterTax };
    });
    const qualBuckets = buckets.filter(b => b.type === "qualified" || b.type === "reit");
    const muniBuckets = buckets.filter(b => b.type === "muni");
    const intBuckets = buckets.filter(b => b.type === "tbill" || b.type === "sweep");
    const qualAfterTax = qualBuckets.reduce((s, b) => s + b.afterTax, 0);
    const muniAfterTax = muniBuckets.reduce((s, b) => s + b.afterTax, 0);
    const intAfterTax = intBuckets.reduce((s, b) => s + b.afterTax, 0);
    const totalAfterTax = qualAfterTax + muniAfterTax + intAfterTax;
    const grossDivAndInt = buckets.reduce((s, b) => s + b.grossIncome, 0);
    const growthBucketsForReturn = buckets.filter(b => b.grows);
    const yr1GrowthPrincipal = growthBucketsForReturn.reduce((s, b) => s + b.invested, 0);
    const yr1CapitalGrowth = yr1GrowthPrincipal * growthRate;
    const yr1TotalGrossReturn = yr1CapitalGrowth + grossDivAndInt;
    const passiveIncomeAsPercent = yr1TotalGrossReturn > 0 ? totalAfterTax / yr1TotalGrossReturn : 0;
    const annualWithdrawal = parseFloat(withdrawalInput) || 0;
    const growthBuckets = buckets.filter(b => b.grows);
    const startingGrowthPrincipal = growthBuckets.reduce((s, b) => s + b.invested, 0);
    const incomeBuckets = buckets.filter(b => !b.grows);
    const startingIncomePool = incomeBuckets.reduce((s, b) => s + b.invested, 0);
    const incomePoolAfterTaxYield = startingIncomePool > 0 ? incomeBuckets.reduce((s, b) => s + b.afterTax, 0) / startingIncomePool : 0;
    const growthBucketDivYield = startingGrowthPrincipal > 0 ? growthBuckets.reduce((s, b) => s + b.afterTax, 0) / startingGrowthPrincipal : 0;
    const compoundTable = [];
    let gp = startingGrowthPrincipal, ip = startingIncomePool, twc = 0;
    for (let yr = 1; yr <= 50; yr++) {
      gp = gp + gp * growthRate;
      const ipi = ip * incomePoolAfterTaxYield;
      const gpd = gp * growthBucketDivYield;
      const tpi = ipi + gpd;
      const left = tpi - annualWithdrawal;
      if (left >= 0) ip = ip + left; else gp = gp + left;
      if (gp < 0) gp = 0;
      twc += annualWithdrawal;
      if (DEFAULTS.milestones.includes(yr)) compoundTable.push({ year: yr, growthPool: gp, incomePool: ip, totalPortfolio: gp + ip, totalWithdrawn: twc, yrPassiveIncome: tpi, yrGrowthDivIncome: gpd, yrIncomePoolIncome: ipi });
    }
    const withdrawalPctOfGross = yr1TotalGrossReturn > 0 ? annualWithdrawal / yr1TotalGrossReturn : 0;
    const withdrawalPctOfNet = totalAfterTax > 0 ? annualWithdrawal / totalAfterTax : 0;
    const withdrawalPctOfPrincipal = investable > 0 ? annualWithdrawal / investable : 0;
    return { isLottery, jackpot, cash, cashRatioActual, ratioFlag, fedWithholding, fedActual, fedOwedAtFiling, arTax, totalTax, net, setAside, investable, buckets, qualAfterTax, muniAfterTax, intAfterTax, totalAfterTax, grossDivAndInt, yr1CapitalGrowth, yr1TotalGrossReturn, passiveIncomeAsPercent, startingGrowthPrincipal, startingIncomePool, annualWithdrawal, compoundTable, withdrawalPctOfGross, withdrawalPctOfNet, withdrawalPctOfPrincipal };
  }, [mode, jackpotInput, cashInput, useCustomCash, lumpSumInput, withdrawalInput, setAsideInput, allocs, yields, growthRate]);

  const satellites = useMemo(() => {
    const count = parseInt(satCount) || 0;
    const funding = parseFloat(satFunding) || 0;
    const triggerYr = parseInt(satTriggerYear) || 15;
    const rate = (parseFloat(satGrowthRate) || 7) / 100;
    const amiMult = parseFloat(satAmiMultiplier) || 5;
    const totalFunded = count * funding;
    const postTriggerGrossYield = 0.037;
    const postTriggerAfterTaxYield = 0.0254;
    const table = [];
    let perTrust = funding;
    for (let yr = 1; yr <= 50; yr++) {
      const triggered = yr >= triggerYr;
      if (!triggered) perTrust = perTrust * (1 + rate);
      if (DEFAULTS.milestones.includes(yr)) {
        const amiForYear = AMI_2026 * Math.pow(1 + AMI_GROWTH, yr);
        const amiCap = amiForYear * amiMult;
        const grossIncPT = triggered ? perTrust * postTriggerGrossYield : 0;
        const afterTaxIncPT = triggered ? perTrust * postTriggerAfterTaxYield : 0;
        const distributionPT = triggered ? Math.min(afterTaxIncPT, amiCap) : 0;
        const retainedPT = triggered ? afterTaxIncPT - distributionPT : 0;
        table.push({ year: yr, perTrust, allTrusts: perTrust * count, triggered, amiCap, grossIncomePerTrust: grossIncPT, afterTaxIncomePerTrust: afterTaxIncPT, distributionPerTrust: distributionPT, retainedPerTrust: retainedPT, distributionAll: distributionPT * count, afterTaxIncomeAll: afterTaxIncPT * count });
      }
    }
    let triggerValue = funding;
    for (let yr = 1; yr < triggerYr; yr++) triggerValue = triggerValue * (1 + rate);
    const triggerAmi = AMI_2026 * Math.pow(1 + AMI_GROWTH, triggerYr);
    const triggerAmiCap = triggerAmi * amiMult;
    const triggerGrossIncome = triggerValue * postTriggerGrossYield;
    const triggerAfterTaxIncome = triggerValue * postTriggerAfterTaxYield;
    const triggerDistribution = Math.min(triggerAfterTaxIncome, triggerAmiCap);
    return { count, funding, totalFunded, triggerYr, rate, amiMult, table, triggerValue, triggerGrossIncome, triggerAfterTaxIncome, triggerAmiCap, triggerDistribution };
  }, [satCount, satFunding, satTriggerYear, satGrowthRate, satAmiMultiplier]);

  const amiTable = useMemo(() => {
    return [0, 5, 10, 15, 20, 30, 40, 50].map(yr => {
      const ami = AMI_2026 * Math.pow(1 + AMI_GROWTH, yr);
      const mult = parseFloat(satAmiMultiplier) || 5;
      return { year: yr === 0 ? "Now" : "Yr " + yr, ami: Math.round(ami), cap: Math.round(ami * mult) };
    });
  }, [satAmiMultiplier]);

  const inputStyle = { background: "#1a1a1a", border: "1px solid #333", color: "#e0e0e0", padding: "8px 12px", borderRadius: "4px", fontSize: "14px", fontFamily: "'IBM Plex Mono', monospace", width: "200px" };
  const smallInput = { ...inputStyle, width: 70 };
  const now = new Date();
  const dateStr = now.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

  return (
    <div className="print-root" style={{ background: "#0d0d0d", color: "#d4d4d4", minHeight: "100vh", fontFamily: "'IBM Plex Mono', 'Courier New', monospace", fontSize: "13px", padding: "24px", lineHeight: 1.6 }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <h1 style={{ fontSize: "16px", fontWeight: 600, color: "#999", marginBottom: 4, letterSpacing: "0.05em" }}>INVESTMENT INCOME CALCULATOR</h1>
            <div style={{ fontSize: "11px", color: "#555", marginBottom: 24 }}>v2 · AR resident · 2026 tax law (AR 3.7% per HB 1001) · conservative yields · {dateStr}</div>
          </div>
          <button className="no-print" onClick={() => window.print()} style={{ background: "#1a1a1a", color: "#8bc34a", border: "1px solid #333", padding: "6px 16px", fontSize: "11px", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: "0.05em", cursor: "pointer", borderRadius: "4px", whiteSpace: "nowrap" }}>PRINT</button>
        </div>

        <div className="no-print" style={{ display: "flex", gap: 0, marginBottom: 20 }}>
          {["lottery", "direct"].map(m => (<button key={m} onClick={() => setMode(m)} style={{ background: mode === m ? "#1a1a1a" : "transparent", color: mode === m ? "#8bc34a" : "#555", border: "1px solid #333", padding: "6px 16px", fontSize: "11px", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: "0.05em", cursor: "pointer", borderRadius: m === "lottery" ? "4px 0 0 4px" : "0 4px 4px 0" }}>{m === "lottery" ? "LOTTERY WIN" : "DIRECT INVESTMENT"}</button>))}
        </div>

        <div className="no-print" style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 24, alignItems: "flex-end" }}>
          {calc.isLottery ? (<>
            <div><label style={{ display: "block", fontSize: "11px", color: "#666", marginBottom: 4 }}>ADVERTISED JACKPOT ($)</label><input style={inputStyle} type="number" value={jackpotInput} onChange={e => setJackpotInput(e.target.value)} /></div>
            <div><label style={{ display: "block", fontSize: "11px", color: "#666", marginBottom: 4 }}><input type="checkbox" checked={useCustomCash} onChange={e => setUseCustomCash(e.target.checked)} style={{ marginRight: 6 }} />CUSTOM CASH VALUE ($)</label><input style={{ ...inputStyle, opacity: useCustomCash ? 1 : 0.3 }} type="number" value={cashInput} onChange={e => setCashInput(e.target.value)} disabled={!useCustomCash} /></div>
          </>) : (<div><label style={{ display: "block", fontSize: "11px", color: "#666", marginBottom: 4 }}>LUMP SUM TO INVEST ($)</label><input style={inputStyle} type="number" value={lumpSumInput} onChange={e => setLumpSumInput(e.target.value)} /></div>)}
          <div><label style={{ display: "block", fontSize: "11px", color: "#666", marginBottom: 4 }}>ANNUAL WITHDRAWAL ($)</label><input style={inputStyle} type="number" value={withdrawalInput} onChange={e => setWithdrawalInput(e.target.value)} /></div>
          <div><label style={{ display: "block", fontSize: "11px", color: "#666", marginBottom: 4 }}>PRE-INVESTMENT SET-ASIDE ($)</label><input style={inputStyle} type="number" value={setAsideInput} onChange={e => setSetAsideInput(e.target.value)} /></div>
          <div><label style={{ display: "block", fontSize: "11px", color: "#666", marginBottom: 4 }}>GROWTH RATE (%)</label><input style={smallInput} type="number" min="1" max="20" value={growthRateInput} onChange={e => setGrowthRateInput(e.target.value)} /></div>
        </div>

        <div className="no-print" style={{ marginBottom: 24, padding: "16px 20px", background: "#111", border: "1px solid #2a2a2a", borderRadius: "4px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: "11px", color: "#666", letterSpacing: "0.05em" }}>ALLOCATION MIX</div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: "11px", color: totalAlloc === 100 ? "#8bc34a" : "#e57373", fontWeight: 600 }}>{totalAlloc}%{totalAlloc !== 100 ? " ⚠" : ""}</span>
              <button onClick={resetAllocs} style={{ background: "transparent", color: "#555", border: "1px solid #333", padding: "2px 8px", fontSize: "10px", fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer", borderRadius: "3px" }}>RESET</button>
            </div>
          </div>
          {DEFAULT_ALLOCS.map((a, i) => (<div key={i} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}><div style={{ width: 70, fontSize: "11px", color: "#888", flexShrink: 0 }}>{a.shortLabel}</div><input type="range" min="0" max="100" step="1" value={allocs[i]} onChange={e => handleSlider(i, parseInt(e.target.value))} style={{ flex: 1, accentColor: "#8bc34a", height: 4 }} /><div style={{ width: 36, fontSize: "12px", color: "#ccc", textAlign: "right", fontWeight: 500 }}>{allocs[i]}%</div><div style={{ width: 14, fontSize: "10px", color: "#444", textAlign: "center", flexShrink: 0 }}>|</div><input type="number" min="0" max="20" step="0.01" value={yields[i]} onChange={e => { const v = [...yields]; v[i] = e.target.value; setYields(v); }} style={{ width: 58, background: "#111", border: "1px solid #2a2a2a", color: "#aaa", padding: "2px 6px", borderRadius: "3px", fontSize: "11px", fontFamily: "'IBM Plex Mono', monospace", textAlign: "right" }} /><div style={{ width: 14, fontSize: "10px", color: "#555", flexShrink: 0 }}>%</div></div>))}
          {totalAlloc !== 100 && (<div style={{ fontSize: "10px", color: "#e57373", marginTop: 4 }}>Total must equal 100%. Currently {totalAlloc}% — adjust sliders.</div>)}
        </div>

        <div className="print-params-block" style={{ marginBottom: 16, fontSize: "11px" }}>
          <div><strong>Mode:</strong> {calc.isLottery ? "Lottery Win" : "Direct Investment"} · <strong>Growth Rate:</strong> {growthRateInput}%</div>
          {calc.isLottery ? (<><div><strong>Advertised Jackpot:</strong> {fmtFull(calc.jackpot)}</div>{useCustomCash && <div><strong>Custom Cash Value:</strong> {fmtFull(calc.cash)}</div>}</>) : (<div><strong>Lump Sum:</strong> {fmtFull(calc.net)}</div>)}
          {calc.annualWithdrawal > 0 && <div><strong>Annual Withdrawal:</strong> {fmtFull(calc.annualWithdrawal)}</div>}
          {calc.setAside > 0 && <div><strong>Set-Aside:</strong> {fmtFull(calc.setAside)}</div>}
          <div><strong>Allocation:</strong> {DEFAULT_ALLOCS.map((a, i) => a.shortLabel + " " + allocs[i] + "%").join(" · ")}</div>
        </div>

        <div className="summary-box" style={{ background: "#111", border: "1px solid #2a2a2a", padding: "16px 20px", marginBottom: 24, borderRadius: "4px" }}>
          {calc.isLottery && (<div style={{ color: "#8bc34a", fontSize: "15px", fontWeight: 600 }}>Net after taxes: {fmtFull(calc.net)}</div>)}
          <div style={{ color: "#8bc34a", fontSize: "15px", fontWeight: 600, marginTop: calc.isLottery ? 4 : 0 }}>
            {!calc.isLottery && <>Investing: {fmtFull(calc.investable)} · </>}{fmtFull(Math.round(calc.totalAfterTax))}/yr passive income (~{fmtFull(Math.round(calc.totalAfterTax / 12))}/mo)
          </div>
          <div style={{ color: "#777", fontSize: "12px", marginTop: 6 }}>Yr 1 total gross return: {fmtFull(Math.round(calc.yr1TotalGrossReturn))} — passive income is {pct(calc.passiveIncomeAsPercent)} of that</div>
        </div>

        <div style={{ fontSize: "11px", color: "#777", marginBottom: 20 }}>{calc.isLottery && calc.ratioFlag && (<div style={{ color: "#e57373", marginBottom: 4 }}>⚠ Cash ratio is {pct(calc.cashRatioActual)} — typical range is 42–62%.</div>)}</div>

        {calc.isLottery && (<>
          <SectionHeader>1. CASH OPTION → TAXES → NET</SectionHeader>
          <Table rows={[["Advertised jackpot (annuity)", fmtFull(calc.jackpot)], ["Cash option (" + pct(calc.cashRatioActual) + ")", fmtFull(calc.cash)], ["", ""], ["Federal 24% withholding (day-of)", fmtFull(calc.fedWithholding)], ["Federal actual @ 37%", fmtFull(calc.fedActual)], ["  └ Owed at filing", fmtFull(calc.fedOwedAtFiling)], ["Arkansas state @ 3.7%", fmtFull(calc.arTax)], ["Total tax", fmtFull(calc.totalTax)], ["", ""], ["NET TAKE-HOME", fmtFull(calc.net)], ...(calc.setAside > 0 ? [["  └ Set-aside (not invested)", "−" + fmtFull(calc.setAside)], ["AMOUNT INVESTED", fmtFull(calc.investable)]] : [])]} highlight={calc.setAside > 0 ? [9, 11] : [9]} />
        </>)}

        <SectionHeader>2. ALLOCATION OF NET</SectionHeader>
        <Table headers={["Bucket", "Alloc", "Invested", "Yield", "Gross Income"]} rows={[...calc.buckets.map(b => [b.label, pct(b.pct), fmt(b.invested), pct(b.yield), fmtFull(Math.round(b.grossIncome))]), ["", "", "", "", ""], ["TOTAL", pct(totalAlloc / 100), fmtFull(Math.round(calc.investable)), "", fmtFull(Math.round(calc.grossDivAndInt))]]} highlight={[calc.buckets.length + 1]} />

        <SectionHeader>3. AFTER-TAX INCOME BY BUCKET</SectionHeader>
        <Table headers={["Bucket", "Gross", "Fed Tax", "AR Tax", "After-Tax"]} rows={[...calc.buckets.map(b => [b.label, fmtFull(Math.round(b.grossIncome)), fmtFull(Math.round(b.fedTax)), fmtFull(Math.round(b.stateTax)), fmtFull(Math.round(b.afterTax))]), ["", "", "", "", ""], ["TOTAL", fmtFull(Math.round(calc.grossDivAndInt)), fmtFull(Math.round(calc.buckets.reduce((s, b) => s + b.fedTax, 0))), fmtFull(Math.round(calc.buckets.reduce((s, b) => s + b.stateTax, 0))), fmtFull(Math.round(calc.totalAfterTax))]]} highlight={[calc.buckets.length + 1]} />

        <SectionHeader>4. INCOME SUMMARY (YEAR 1)</SectionHeader>
        <Table rows={[["Qualified dividend income (incl. REITs, after-tax)", fmtFull(Math.round(calc.qualAfterTax)) + "/yr", fmtFull(Math.round(calc.qualAfterTax / 12)) + "/mo"], ["Tax-free muni interest", fmtFull(Math.round(calc.muniAfterTax)) + "/yr", fmtFull(Math.round(calc.muniAfterTax / 12)) + "/mo"], ["Interest income — T-bills + Sweep (after-tax)", fmtFull(Math.round(calc.intAfterTax)) + "/yr", fmtFull(Math.round(calc.intAfterTax / 12)) + "/mo"], ["", "", ""], ["TOTAL PASSIVE INCOME (after-tax)", fmtFull(Math.round(calc.totalAfterTax)) + "/yr", fmtFull(Math.round(calc.totalAfterTax / 12)) + "/mo"]]} highlight={[4]} />
        <div className="section-header" style={{ fontSize: "11px", color: "#666", marginTop: 8, marginBottom: 4 }}>YEAR 1 TOTAL RETURN CONTEXT</div>
        <Table rows={[["Capital growth (" + growthRateInput + "% on growth buckets)", fmtFull(Math.round(calc.yr1CapitalGrowth)), "(unrealized — stays invested)"], ["Gross dividends + interest (all buckets)", fmtFull(Math.round(calc.grossDivAndInt)), "(produces passive income above)"], ["", "", ""], ["TOTAL GROSS RETURN (Yr 1)", fmtFull(Math.round(calc.yr1TotalGrossReturn)), ""], ["After-tax passive income as % of total gross return", pct(calc.passiveIncomeAsPercent), ""]]} highlight={[3]} />
        {calc.annualWithdrawal > 0 && (<>
          <div className="section-header" style={{ fontSize: "11px", color: "#666", marginTop: 8, marginBottom: 4 }}>WITHDRAWAL CONTEXT</div>
          <Table rows={[["Annual withdrawal", fmtFull(calc.annualWithdrawal), ""], ["As % of total gross return (" + fmtFull(Math.round(calc.yr1TotalGrossReturn)) + ")", pct(calc.withdrawalPctOfGross), calc.withdrawalPctOfGross > 1 ? "⚠ exceeds total gross" : ""], ["As % of net passive income (" + fmtFull(Math.round(calc.totalAfterTax)) + ")", pct(calc.withdrawalPctOfNet), calc.withdrawalPctOfNet > 1 ? "⚠ exceeds net passive" : ""], ["As % of total invested principal (" + fmtFull(Math.round(calc.investable)) + ")", pct(calc.withdrawalPctOfPrincipal || 0), ""]]} highlight={[]} />
        </>)}

        <SectionHeader>5. COMPOUND GROWTH ({growthRateInput}% GROWTH · INCOME REINVESTED)</SectionHeader>
        <div style={{ fontSize: "11px", color: "#666", marginBottom: 8 }}>
          Starting growth pool (S&amp;P + Stocks): {fmt(calc.startingGrowthPrincipal)} · Income pool (starting): {fmt(calc.startingIncomePool)}
          {calc.annualWithdrawal > 0 && <span> · Withdrawing {fmtFull(calc.annualWithdrawal)}/yr</span>}
        </div>
        <Table headers={["Year", "Growth Pool", "Income Pool", "Total Portfolio", "Total Withdrawn"]} rows={calc.compoundTable.map(r => ["Yr " + r.year, fmt(Math.round(r.growthPool)), fmt(Math.round(r.incomePool)), fmt(Math.round(r.totalPortfolio)), calc.annualWithdrawal > 0 ? fmtFull(Math.round(r.totalWithdrawn)) : "—"])} highlight={[calc.compoundTable.length - 1]} />

        <SectionHeader>5A. PROJECTED PASSIVE INCOME ({growthRateInput}% GROWTH)</SectionHeader>
        <div style={{ fontSize: "11px", color: "#666", marginBottom: 8 }}>
          Year 1 baseline: {fmtFull(Math.round(calc.totalAfterTax))}/yr · Growth-bucket dividends scale with corpus · Income-pool yield stays ~flat
          {calc.annualWithdrawal > 0 && <span> · Income shown is before withdrawal</span>}
        </div>
        <Table headers={["Year", "Growth Divs", "Income Pool", "Total Income", "Monthly", "vs Yr 1"]} rows={calc.compoundTable.map((r, ri) => {
          const mult = calc.totalAfterTax > 0 ? r.yrPassiveIncome / calc.totalAfterTax : 0;
          return ["Yr " + r.year, fmtFull(Math.round(r.yrGrowthDivIncome)), fmtFull(Math.round(r.yrIncomePoolIncome)), fmtFull(Math.round(r.yrPassiveIncome)), fmtFull(Math.round(r.yrPassiveIncome / 12)) + "/mo", ri === 0 ? "—" : mult.toFixed(1) + "×"];
        })} highlight={[calc.compoundTable.length - 1]} />

        <div style={{ marginTop: 28 }}>
          <div className="no-print" onClick={() => setShowSatellites(!showSatellites)} style={{ fontSize: "12px", fontWeight: 600, color: "#666", letterSpacing: "0.04em", cursor: "pointer", userSelect: "none", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: "#555", fontSize: "10px" }}>{showSatellites ? "▼" : "▶"}</span>
            6. SATELLITE TRUSTS (GROWTH → INCOME · AMI-INDEXED)
          </div>
          {showSatellites && (<>
            <div className="no-print" style={{ display: "flex", flexWrap: "wrap", gap: 12, marginTop: 12, marginBottom: 16 }}>
              <div><label style={{ display: "block", fontSize: "10px", color: "#666", marginBottom: 3 }}>COUNT</label><input style={smallInput} type="number" min="1" max="20" value={satCount} onChange={e => setSatCount(e.target.value)} /></div>
              <div><label style={{ display: "block", fontSize: "10px", color: "#666", marginBottom: 3 }}>FUNDING EACH ($)</label><input style={{ ...inputStyle, width: 150 }} type="number" value={satFunding} onChange={e => setSatFunding(e.target.value)} /></div>
              <div><label style={{ display: "block", fontSize: "10px", color: "#666", marginBottom: 3 }}>TRIGGER YEAR</label><input style={smallInput} type="number" min="1" max="50" value={satTriggerYear} onChange={e => setSatTriggerYear(e.target.value)} /></div>
              <div><label style={{ display: "block", fontSize: "10px", color: "#666", marginBottom: 3 }}>GROWTH %</label><input style={smallInput} type="number" min="1" max="20" value={satGrowthRate} onChange={e => setSatGrowthRate(e.target.value)} /></div>
              <div><label style={{ display: "block", fontSize: "10px", color: "#666", marginBottom: 3 }}>AMI MULT (×)</label><input style={smallInput} type="number" min="1" max="10" step="0.5" value={satAmiMultiplier} onChange={e => setSatAmiMultiplier(e.target.value)} /></div>
            </div>
            <div style={{ fontSize: "11px", color: "#666", marginBottom: 8 }}>{satellites.count} trusts × {fmtFull(satellites.funding)} = {fmtFull(satellites.totalFunded)} funded · {parseFloat(satGrowthRate)}% growth · Trigger Yr {satellites.triggerYr} · Distribution cap: {satAmiMultiplier}× AMI</div>

            <div className="section-header" style={{ fontSize: "11px", color: "#666", marginTop: 4, marginBottom: 4 }}>AMI REFERENCE ({satAmiMultiplier}× MULTIPLIER)</div>
            <Table headers={["Year", "AMI (est.)", satAmiMultiplier + "× AMI Cap"]} rows={amiTable.map(r => [r.year, fmtFull(r.ami), fmtFull(r.cap)])} highlight={[]} />

            <div className="section-header" style={{ fontSize: "11px", color: "#666", marginTop: 12, marginBottom: 4 }}>SATELLITE GROWTH &amp; INCOME</div>
            <Table headers={["Year", "Per Trust", "Status", "Distribution/Yr", "AMI Cap", "Retained"]} rows={satellites.table.map(r => ["Yr " + r.year, fmt(Math.round(r.perTrust)), r.triggered ? "→ Income" : "Growing", r.triggered ? fmtFull(Math.round(r.distributionPerTrust)) : "—", r.triggered ? fmtFull(Math.round(r.amiCap)) : "—", r.triggered ? (r.retainedPerTrust > 100 ? fmtFull(Math.round(r.retainedPerTrust)) + " ⚠" : fmtFull(Math.round(r.retainedPerTrust))) : "—"])} highlight={[satellites.table.findIndex(r => r.triggered)]} />

            <div className="section-header" style={{ fontSize: "11px", color: "#666", marginTop: 12, marginBottom: 4 }}>POST-TRIGGER SUMMARY (AT YR {satellites.triggerYr})</div>
            <Table rows={[["Trust value at trigger", fmtFull(Math.round(satellites.triggerValue))], ["Gross income (3.7% blended)", fmtFull(Math.round(satellites.triggerGrossIncome)) + "/yr"], ["After-tax income available", fmtFull(Math.round(satellites.triggerAfterTaxIncome)) + "/yr"], ["AMI cap (" + satAmiMultiplier + "× at Yr " + satellites.triggerYr + ")", fmtFull(Math.round(satellites.triggerAmiCap)) + "/yr"], ["Distribution to beneficiary", fmtFull(Math.round(satellites.triggerDistribution)) + "/yr", fmtFull(Math.round(satellites.triggerDistribution / 12)) + "/mo"], ["", ""], ["ALL " + satellites.count + " TRUSTS — distributions", fmtFull(Math.round(satellites.triggerDistribution * satellites.count)) + "/yr", fmtFull(Math.round(satellites.triggerDistribution * satellites.count / 12)) + "/mo"]]} highlight={[6]} />

            <div style={{ fontSize: "11px", color: "#555", marginTop: 8 }}>
              <div>• AMI base: {fmtFull(AMI_2026)} (2026 est.) growing ~2.6%/yr (tracks COLA).</div>
              <div>• Distribution capped at {satAmiMultiplier}× AMI for beneficiary's year. Excess retained (taxed at compressed rates).</div>
              <div>• Pre-trigger: pure growth. Grantor pays tax. Post-trigger: income allocation, all distributed up to AMI cap.</div>
              <div>• Retained income above AMI cap taxed at 37% inside trust above ~$15,200 (2026). Size funding to match cap.</div>
              <div>• Each trust needs EIN, Form 1041, trustee. ~$5-10K/yr admin per trust.</div>
              <div>• Funding counts against $15M lifetime gift exemption per individual (OBBBA 2026, permanent).</div>
            </div>
          </>)}
        </div>

        <div className="disclaimer" style={{ marginTop: 32, fontSize: "11px", color: "#555", borderTop: "1px solid #222", paddingTop: 16 }}>
          <div>• Cash ratio default 50%. Actual varies with prevailing interest rates (running ~42-45% recently).</div>
          <div>• Yields are conservative current estimates. Actual varies.</div>
          <div>• 2026 tax law assumed. AR top rate 3.7% (HB 1001, signed May 6 2026, retroactive to Jan 1).</div>
          <div>• Federal estate/gift exemption $15M/person ($30M married) — OBBBA made permanent Jul 2025.</div>
          <div>• T-bill and sweep yields move with Fed rate — verify if calc is months old.</div>
          <div>• Qualified dividends taxed at 23.8% fed (20% + 3.8% NIIT) + 3.7% AR.</div>
          <div>• REIT dividends: 29.6% fed (37% × 0.80 Section 199A deduction, permanent under OBBBA) + 3.7% AR.</div>
          <div>• AR-issued municipal bonds: 0% fed + 0% AR (double tax-free). Out-of-state munis lose AR exemption.</div>
          <div>• T-bill interest exempt from AR state tax. Sweep/MMF fully taxable.</div>
          <div>• Compound growth rate is user-adjustable (default 7%, long-run S&amp;P real avg).</div>
          <div>• Annual withdrawal deducted from passive income first. Shortfall (if any) pulled from growth pool.</div>
          <div>• AMI indexed at ~2.6%/yr from 2026 base of {fmtFull(AMI_2026)}. Satellite distributions capped at AMI multiplier.</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
