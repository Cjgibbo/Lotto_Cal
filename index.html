<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lottery Calc" />
<title>Lottery Cash Calculator v2</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230d0d0d' width='100' height='100' rx='20'/><text x='50' y='65' font-size='44' text-anchor='middle' fill='%238bc34a' font-family='monospace' font-weight='bold'>$</text></svg>" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; }

  @media print {
    body, html { background: #fff !important; color: #000 !important; }
    .no-print { display: none !important; }
    .print-root { background: #fff !important; color: #111 !important; padding: 0 !important; font-size: 11px !important; }
    .print-root * { color: #111 !important; border-color: #ccc !important; }
    .print-root .bottom-line-box { border: 2px solid #111 !important; background: #f5f5f5 !important; }
    .print-root .bottom-line-label { color: #111 !important; }
    .print-root .green-text { color: #2e7d32 !important; }
    .print-root .flag-box { border: 1px solid #aa0000 !important; color: #aa0000 !important; }
  }

  input[type="range"]::-webkit-slider-thumb { background: #8bc34a; }
  input[type="range"]::-moz-range-thumb { background: #8bc34a; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo } = React;

// ============================================================
// LOTTERY CASH OPTION CALCULATOR — v2
// REITs (8%) + Municipal Bonds (7%) added
// 2026 tax law (OBBBA): $15M federal exemption, Section 199A permanent
// AR state: 4.4% top rate
// ============================================================

const FED_QUAL_DIV_RATE = 0.238;
const FED_ORDINARY_RATE = 0.37;
const FED_REIT_RATE = 0.296;
const AR_RATE = 0.044;
const FED_WITHHOLDING_RATE = 0.24;

const DEFAULT_ALLOCATION = {
  sp500:  { pct: 50, yield: 0.013,  label: "S&P 500 (VOO/SPY/IVV)", taxType: "qualified" },
  schd:   { pct: 15, yield: 0.035,  label: "Dividend ETF (SCHD)",   taxType: "qualified" },
  reits:  { pct:  8, yield: 0.042,  label: "REITs (VNQ/SCHH)",      taxType: "reit" },
  munis:  { pct:  7, yield: 0.040,  label: "Municipal Bonds (AR)",  taxType: "muni" },
  tbills: { pct: 10, yield: 0.0425, label: "T-Bills",                taxType: "tbill" },
  stocks: { pct:  5, yield: 0.020,  label: "Individual Stocks",      taxType: "qualified" },
  sweep:  { pct:  5, yield: 0.040,  label: "Cash Sweep / MMF",       taxType: "sweep" },
};

const TAX_RATES = {
  qualified: { fed: FED_QUAL_DIV_RATE, ar: AR_RATE, label: "Qualified Div" },
  reit:      { fed: FED_REIT_RATE,     ar: AR_RATE, label: "REIT (199A)" },
  muni:      { fed: 0,                  ar: 0,       label: "Tax-Free" },
  tbill:     { fed: FED_ORDINARY_RATE, ar: 0,       label: "Treasury Int." },
  sweep:     { fed: FED_ORDINARY_RATE, ar: AR_RATE, label: "Ordinary Int." },
};

const fmt = (n) => "$" + Math.round(n).toLocaleString();
const pct = (n) => (n * 100).toFixed(1) + "%";

function LotteryCalculator() {
  const [jackpot, setJackpot] = useState(157000000);
  const [cashOption, setCashOption] = useState("");
  const [allocation, setAllocation] = useState(DEFAULT_ALLOCATION);
  const [showAllocator, setShowAllocator] = useState(false);

  const cashValue = useMemo(() => {
    if (cashOption && Number(cashOption) > 0) return Number(cashOption);
    return jackpot * 0.43;
  }, [jackpot, cashOption]);

  const cashRatio = jackpot > 0 ? cashValue / jackpot : 0;
  const cashRatioFlag = cashRatio < 0.40 || cashRatio > 0.55;

  const fedWithholding = cashValue * FED_WITHHOLDING_RATE;
  const fedTotal = cashValue * FED_ORDINARY_RATE;
  const fedAdditional = fedTotal - fedWithholding;
  const stateTax = cashValue * AR_RATE;
  const netCash = cashValue - fedTotal - stateTax;

  const allocTotal = useMemo(
    () => Object.values(allocation).reduce((s, b) => s + b.pct, 0),
    [allocation]
  );

  const buckets = useMemo(() => {
    return Object.entries(allocation).map(([key, b]) => {
      const principal = netCash * (b.pct / 100);
      const gross = principal * b.yield;
      const rates = TAX_RATES[b.taxType];
      const fed = gross * rates.fed;
      const ar = gross * rates.ar;
      const net = gross - fed - ar;
      return { key, ...b, rates, principal, gross, fed, ar, net, monthly: net / 12 };
    });
  }, [allocation, netCash]);

  const streams = useMemo(() => {
    const g = {
      qualified: { gross: 0, net: 0, label: "Qualified Dividends (S&P + SCHD + REITs + Stocks)" },
      taxfree:   { gross: 0, net: 0, label: "Tax-Free Muni Interest" },
      interest:  { gross: 0, net: 0, label: "Taxable Interest (T-Bills + Sweep)" },
    };
    buckets.forEach(b => {
      if (b.taxType === "qualified" || b.taxType === "reit") {
        g.qualified.gross += b.gross; g.qualified.net += b.net;
      } else if (b.taxType === "muni") {
        g.taxfree.gross += b.gross; g.taxfree.net += b.net;
      } else {
        g.interest.gross += b.gross; g.interest.net += b.net;
      }
    });
    return g;
  }, [buckets]);

  const totalGross = buckets.reduce((s, b) => s + b.gross, 0);
  const totalNet = buckets.reduce((s, b) => s + b.net, 0);
  const totalMonthly = totalNet / 12;

  const updatePct = (key, val) => {
    setAllocation(prev => ({ ...prev, [key]: { ...prev[key], pct: val } }));
  };

  const resetAllocation = () => setAllocation(DEFAULT_ALLOCATION);

  return (
    <div className="print-root" style={S.root}>
      <div style={S.container}>

        <div style={S.header}>
          <div>
            <div style={S.title}>LOTTERY CASH CALCULATOR</div>
            <div style={S.subtitle}>v2 · 2026 tax law · AR resident · OBBBA</div>
          </div>
          <button className="no-print" onClick={() => window.print()} style={S.printBtn}>PRINT</button>
        </div>

        <div className="no-print" style={S.inputBlock}>
          <Label>Advertised Jackpot</Label>
          <input type="number" value={jackpot}
            onChange={e => setJackpot(Number(e.target.value) || 0)}
            style={S.input} placeholder="157000000" />
          <Label>Cash Option (blank = ~43% of jackpot)</Label>
          <input type="number" value={cashOption}
            onChange={e => setCashOption(e.target.value)}
            style={S.input} placeholder="67000000" />
        </div>

        <div className="bottom-line-box" style={S.bottomLine}>
          <div className="bottom-line-label" style={S.bottomLineLabel}>NET AFTER TAXES</div>
          <div style={S.bottomLineBig}>{fmt(netCash)}</div>
          <div style={S.bottomLineSub}>
            generating <span className="green-text" style={S.green}>{fmt(totalNet)}/yr</span> after-tax
            (~<span className="green-text" style={S.green}>{fmt(totalMonthly)}/mo</span>)
          </div>
          {cashRatioFlag && (
            <div className="flag-box" style={S.flag}>
              ⚠ Cash ratio is {pct(cashRatio)} — outside typical 40–55%. Verify against actual.
            </div>
          )}
        </div>

        <SectionHeader>1. CASH OPTION TAXES</SectionHeader>
        <Table rows={[
          ["Advertised jackpot", fmt(jackpot)],
          [`Cash option (${pct(cashRatio)})`, fmt(cashValue)],
          ["Federal withholding (24% mandatory)", "−" + fmt(fedWithholding)],
          ["Additional federal owed (to 37% bracket)", "−" + fmt(fedAdditional)],
          ["Arkansas state tax (4.4%)", "−" + fmt(stateTax)],
          ["Net take-home", fmt(netCash)],
        ]} highlight={[5]} />

        <SectionHeader>
          2. ALLOCATION OF NET
          <button className="no-print" onClick={() => setShowAllocator(s => !s)} style={S.linkBtn}>
            {showAllocator ? "hide allocator" : "edit allocation"}
          </button>
        </SectionHeader>

        {showAllocator && (
          <div className="no-print" style={S.allocator}>
            {Object.entries(allocation).map(([key, b]) => (
              <div key={key} style={S.sliderRow}>
                <div style={S.sliderLabel}>{b.label}</div>
                <input type="range" min="0" max="100" step="1" value={b.pct}
                  onChange={e => updatePct(key, Number(e.target.value))}
                  style={{ accentColor: "#8bc34a" }} />
                <div style={S.sliderPct}>{b.pct}%</div>
              </div>
            ))}
            <div style={{
              ...S.allocTotal,
              color: allocTotal === 100 ? "#8bc34a" : "#e57373"
            }}>
              Total: {allocTotal}% {allocTotal !== 100 && "⚠ must = 100%"}
              <button onClick={resetAllocation} style={S.resetBtn}>reset</button>
            </div>
          </div>
        )}

        <Table
          headers={["Bucket", "%", "Principal", "Yield", "Tax Type"]}
          rows={buckets.map(b => [b.label, b.pct + "%", fmt(b.principal), pct(b.yield), b.rates.label])}
        />

        <SectionHeader>3. PER-BUCKET INCOME (AFTER TAX)</SectionHeader>
        <Table
          headers={["Bucket", "Gross/yr", "Fed", "AR", "Net/yr", "Net/mo"]}
          rows={buckets.map(b => [
            b.label, fmt(b.gross), "−" + fmt(b.fed), "−" + fmt(b.ar), fmt(b.net), fmt(b.monthly),
          ])}
        />

        <SectionHeader>4. INCOME STREAMS (AFTER TAX)</SectionHeader>
        <Table
          headers={["Stream", "Gross/yr", "Net/yr", "Net/mo"]}
          rows={[
            ...Object.values(streams).map(s => [s.label, fmt(s.gross), fmt(s.net), fmt(s.net / 12)]),
            ["", "", "", ""],
            ["TOTAL", fmt(totalGross), fmt(totalNet), fmt(totalMonthly)],
          ]}
          highlight={[4]}
        />

        <SectionHeader>NOTES & FLAGS</SectionHeader>
        <div style={S.flags}>
          <div>• Cash ratio currently ~42–45% (was ~50% historically). Verify against actual game.</div>
          <div>• Yields are conservative estimates. T-bill, muni, sweep yields move with Fed rate.</div>
          <div>• 2026 tax law: AR 4.4% top; federal $15M estate exemption per person (OBBBA permanent).</div>
          <div>• REIT 20% Section 199A deduction permanent under OBBBA. Effective fed rate: 29.6%.</div>
          <div>• Muni yields assume AR-issued bonds for double tax-free. Out-of-state munis lose AR exemption.</div>
          <div>• Excludes annuity comparison, alternate allocations, trust structures, stress tests.</div>
        </div>

      </div>
    </div>
  );
}

function Label({ children }) {
  return <div style={S.label}>{children}</div>;
}

function SectionHeader({ children }) {
  return <div style={S.sectionHeader}>{children}</div>;
}

function Table({ headers, rows, highlight = [] }) {
  return (
    <div style={{ overflowX: "auto", marginBottom: 8 }}>
      <table style={{ borderCollapse: "collapse", width: "100%" }}>
        {headers && (
          <thead>
            <tr>{headers.map((h, i) => <th key={i} style={S.th}>{h}</th>)}</tr>
          </thead>
        )}
        <tbody>
          {rows.map((row, ri) => (
            <tr key={ri}>
              {row.map((cell, ci) => (
                <td key={ci} style={{
                  ...S.td,
                  color: highlight.includes(ri) ? "#8bc34a" : "#ccc",
                  fontWeight: highlight.includes(ri) ? 600 : 400,
                  borderBottom: row[0] === "" ? "none" : "1px solid #1a1a1a",
                }}>{cell}</td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

const S = {
  root: {
    background: "#0d0d0d",
    minHeight: "100vh",
    color: "#ccc",
    fontFamily: "'IBM Plex Mono', monospace",
    padding: "20px",
  },
  container: { maxWidth: 760, margin: "0 auto" },
  header: {
    display: "flex",
    justifyContent: "space-between",
    alignItems: "flex-end",
    marginBottom: 24,
    paddingBottom: 16,
    borderBottom: "1px solid #2a2a2a",
  },
  title: { fontSize: 18, fontWeight: 600, color: "#fff", letterSpacing: "0.05em" },
  subtitle: { fontSize: 11, color: "#666", marginTop: 4 },
  printBtn: {
    background: "transparent",
    color: "#8bc34a",
    border: "1px solid #8bc34a",
    padding: "6px 14px",
    fontSize: 11,
    fontFamily: "inherit",
    cursor: "pointer",
    letterSpacing: "0.1em",
  },
  inputBlock: { marginBottom: 24 },
  label: { fontSize: 11, color: "#888", marginBottom: 6, marginTop: 12, letterSpacing: "0.05em" },
  input: {
    width: "100%",
    background: "#1a1a1a",
    border: "1px solid #2a2a2a",
    color: "#fff",
    padding: "10px 12px",
    fontSize: 14,
    fontFamily: "inherit",
    outline: "none",
  },
  bottomLine: { background: "#141414", border: "1px solid #8bc34a", padding: 20, marginBottom: 24 },
  bottomLineLabel: { fontSize: 11, color: "#8bc34a", letterSpacing: "0.1em", marginBottom: 8 },
  bottomLineBig: { fontSize: 32, fontWeight: 600, color: "#fff", lineHeight: 1.1 },
  bottomLineSub: { fontSize: 14, color: "#aaa", marginTop: 8 },
  green: { color: "#8bc34a", fontWeight: 600 },
  flag: { fontSize: 11, color: "#e57373", marginTop: 12, padding: 8, border: "1px solid #4a2020" },
  sectionHeader: {
    fontSize: 12,
    fontWeight: 600,
    color: "#666",
    marginTop: 28,
    marginBottom: 8,
    letterSpacing: "0.05em",
    display: "flex",
    justifyContent: "space-between",
    alignItems: "center",
  },
  linkBtn: {
    background: "none",
    border: "none",
    color: "#8bc34a",
    fontSize: 10,
    cursor: "pointer",
    fontFamily: "inherit",
    textDecoration: "underline",
  },
  th: {
    padding: "4px 12px 4px 0",
    textAlign: "left",
    fontSize: 10,
    color: "#555",
    fontWeight: 500,
    borderBottom: "1px solid #333",
    letterSpacing: "0.05em",
  },
  td: { padding: "6px 12px 6px 0", whiteSpace: "nowrap", fontSize: 12 },
  allocator: { background: "#141414", padding: 16, marginBottom: 16, border: "1px solid #2a2a2a" },
  sliderRow: {
    display: "grid",
    gridTemplateColumns: "1fr 2fr 50px",
    alignItems: "center",
    gap: 12,
    marginBottom: 8,
  },
  sliderLabel: { fontSize: 11, color: "#aaa" },
  sliderPct: { fontSize: 12, color: "#fff", textAlign: "right" },
  allocTotal: {
    marginTop: 12,
    paddingTop: 12,
    borderTop: "1px solid #2a2a2a",
    fontSize: 12,
    display: "flex",
    justifyContent: "space-between",
    alignItems: "center",
  },
  resetBtn: {
    background: "none",
    border: "1px solid #444",
    color: "#888",
    padding: "4px 10px",
    fontSize: 10,
    fontFamily: "inherit",
    cursor: "pointer",
  },
  flags: { fontSize: 11, color: "#777", lineHeight: 1.7 },
};

ReactDOM.createRoot(document.getElementById("root")).render(<LotteryCalculator />);
</script>
</body>
</html>
